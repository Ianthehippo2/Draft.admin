<!DOCTYPE html>
<html>
<head>
<title>Schooled Draft Admin</title>
<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
}

button,select,input{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

button{cursor:pointer}
.next{background:gold}
.prev{background:white}
.reset{background:red;color:white}
.import{background:#4caf50;color:white}
</style>
</head>

<body>

<h1>Schooled Draft Admin</h1>

<select id="classSelect">
  <option value="English">English</option>
  <option value="Math">Math</option>
  <option value="Science">Science</option>
  <option value="History">History</option>
  <option value="Spanish">Spanish</option>
</select>

<h2 id="status">Loading...</h2>

<button class="next" onclick="nextReveal()">Next Reveal</button>
<button class="prev" onclick="previousReveal()">Previous</button>
<button class="reset" onclick="resetClass()">Reset Class</button>

<input type="file" id="jsonUpload" accept=".json">
<button class="import" onclick="importStudents()">Import Students JSON</button>

  <button class="import" onclick="syncStarsFromSheet()">Sync Stars From Google Sheet</button>

<script>
const BASE_DB = "https://draft-ac851-default-rtdb.firebaseio.com";
const DRAFT_DB = `${BASE_DB}/draft.json`;

let state = {
  className: "English",
  revealedCount: 0,
  action: "board",
  commandId: 0
};

async function getLatestState(){
  const res = await fetch(`${DRAFT_DB}?cacheBust=${Date.now()}`);
  const data = await res.json();

  if(data){
    state = data;
  }

  updateStatus();
  return state;
}

async function loadState(){
  await getLatestState();
  document.getElementById("classSelect").value = state.className;
}

async function saveState(){
  await fetch(DRAFT_DB,{
    method:"PUT",
    body:JSON.stringify(state)
  });

  updateStatus();
}

function updateStatus(){
  document.getElementById("status").textContent =
    `${state.className} - ${state.revealedCount} Revealed`;
}

async function nextReveal(){
  await getLatestState();

  state.action = "next";
  state.commandId = Date.now();

  await saveState();
}

async function previousReveal(){
  await getLatestState();

  if(state.revealedCount > 0){
    state.revealedCount--;
  }

  state.action = "board";
  state.commandId = Date.now();

  await saveState();
}

async function resetClass(){
  await getLatestState();

  state.revealedCount = 0;
  state.action = "board";
  state.commandId = Date.now();

  await saveState();
}

document.getElementById("classSelect").addEventListener("change", async function(){
  await getLatestState();

  state.className = this.value;
  state.revealedCount = 0;
  state.action = "board";
  state.commandId = Date.now();

  await saveState();
});

async function importStudents(){
  const fileInput = document.getElementById("jsonUpload");
  const file = fileInput.files[0];

  if(!file){
    alert("Choose a JSON file first.");
    return;
  }

  try{
    const text = await file.text();
    const data = JSON.parse(text);

    let students = [];

    if(data.classes && data.classes[state.className] && data.classes[state.className].students){
      students = data.classes[state.className].students;
    }else if(Array.isArray(data)){
      students = data;
    }else{
      alert("Could not find students in this JSON.");
      return;
    }

    await fetch(`${BASE_DB}/classes/${state.className}/students.json`, {
      method: "PUT",
      body: JSON.stringify(students)
    });

    state.revealedCount = 0;
    state.action = "board";
    state.commandId = Date.now();

    await saveState();

    alert(`Imported ${students.length} students into ${state.className}.`);
  }catch(error){
    alert("Import failed. Make sure the file is valid JSON.");
    console.error(error);
  }
}

setInterval(getLatestState, 1000);
loadState();
 
  async function syncStarsFromSheet(){
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1bhtZBaC-JDy1TzrKo8DGd6rP_OffNAlXPRWYJTq2Rks/export?format=csv";

  try{
    const res = await fetch(SHEET_CSV_URL);

    if(!res.ok){
      alert("Could not read Google Sheet. Make sure sharing is set to Anyone with the link can view.");
      return;
    }

    const csv = await res.text();

    function parseCSV(text){
      const rows = [];
      let row = [];
      let cell = "";
      let insideQuotes = false;

      for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"' && insideQuotes && next === '"'){
          cell += '"';
          i++;
        }else if(char === '"'){
          insideQuotes = !insideQuotes;
        }else if(char === "," && !insideQuotes){
          row.push(cell.trim());
          cell = "";
        }else if((char === "\n" || char === "\r") && !insideQuotes){
          if(cell || row.length){
            row.push(cell.trim());
            rows.push(row);
            row = [];
            cell = "";
          }
        }else{
          cell += char;
        }
      }

      if(cell || row.length){
        row.push(cell.trim());
        rows.push(row);
      }

      return rows;
    }

    function cleanName(name){
      return String(name || "")
        .toLowerCase()
        .replace(/[^a-z\s-]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    const rows = parseCSV(csv);

    const headers = rows[0].map(h => h.trim());
    const nameIndex = headers.findIndex(h => h.toLowerCase() === "name");
    const starsIndex = headers.findIndex(h => h.toLowerCase() === "stars");

    if(nameIndex === -1 || starsIndex === -1){
      alert("Your Google Sheet must have columns called Name and Stars.");
      return;
    }

    const rankings = {};

    rows.slice(1).forEach(row => {
      const name = cleanName(row[nameIndex]);
      const stars = Number(row[starsIndex]);

      if(name && stars >= 1 && stars <= 5){
        rankings[name] = stars;
      }
    });

    const studentsRes = await fetch(`${BASE_DB}/classes/${state.className}/students.json?cacheBust=${Date.now()}`);
    let students = await studentsRes.json();

    if(!students){
      alert("No students found in Firebase for this class.");
      return;
    }

    students = Array.isArray(students) ? students : Object.values(students);

    let matched = 0;
    let unmatched = 0;

    students = students.map(student => {
      const key = cleanName(student.name);

      if(rankings[key] !== undefined){
        student.stars = rankings[key];
        matched++;
      }else{
        student.stars = 1;
        unmatched++;
      }

      return student;
    });

    await fetch(`${BASE_DB}/classes/${state.className}/students.json`, {
      method: "PUT",
      body: JSON.stringify(students)
    });

    state.revealedCount = 0;
    state.action = "board";
    state.commandId = Date.now();
    await saveState();

    alert(`Stars synced.\nMatched: ${matched}\nNot found, set to 1 star: ${unmatched}`);
  }catch(error){
    console.error(error);
    alert("Star sync failed. Check that the Google Sheet is public and has Name and Stars columns.");
  }
}
</script>

</body>
</html>
